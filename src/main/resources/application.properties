spring.application.name=vault-ledger

# ---- Database Connection ----
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/banking_core}
spring.datasource.username=${DATABASE_USERNAME:harshit}
spring.datasource.password=${DATABASE_PASSWORD:securepass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- HikariCP Connection Pool Tuning ----
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT Configuration ----
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHNhbXBsZSBiYXNlNjQgZW5jb2RlZCBzZWNyZXQga2V5IGZvciBkZXY=}
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=86400000

# ---- Error Handling ----
server.error.include-message=always
